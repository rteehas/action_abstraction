defaults:
  - ppo_trainer
  - actor@abstraction_actor_rollout_ref.actor: ${model_engine}_actor
  - ref@abstraction_actor_rollout_ref.ref: ${model_engine}_ref
  - rollout@abstraction_actor_rollout_ref.rollout: rollout
  - model@abstraction_actor_rollout_ref.model: hf_model
  - _self_

data:
  gen_batch_size: ${data.train_batch_size}

abstraction_actor_rollout_ref:
  hybrid_engine: true
  nccl_timeout: 600
  rollout:
    layered_summon: False

two_policy:
  # Source of truth for abstraction-stage rollout prompts in TwoPolicyGRPOTrainer.
  # The parquet prompt column is still loaded by the generic VERL dataset pipeline,
  # but two-policy training rewrites raw_prompt from this template before rollout.
  abstraction_prompt_template_path: /workspace/action_abstraction/prompt_templates/sft_principle_generation.txt
  # Source of truth for solver-stage rollout prompts; the solver prompt is also
  # rebuilt in-trainer from config rather than read from parquet.
  solver_prompt_template_path: /workspace/action_abstraction/prompt_templates/hint_conditioned_problem_solving_rich_v1.txt
  abstraction_open_tag: '<abstraction>'
  abstraction_close_tag: '</abstraction>'
  num_abstractions: 4
  num_solver_rollouts: 4
  validation_num_abstractions: 1
  validation_num_solver_rollouts: 1
  validation_solver_response_length: null
  control_abstraction:
    enable: False
    text: 'Identify the givens, translate the problem into mathematical relations, and solve step by step.'
    include_in_validation: False
  decoupled_solver_schedule:
    enable: False
    mode: periodic
    solver_update_every_n_steps: 1
    block_size: 1
    start_with: solver
    non_update_solver_rollouts: 1
    non_update_solver_temperature: 0.0
    non_update_solver_top_p: 1.0
    non_update_solver_top_k: -1
  decoupled_abstraction_schedule:
    enable: False
    use_solver_update_complement: True
    non_update_abstractions: 1
    non_update_abstraction_temperature: 0.0
    non_update_abstraction_top_p: 1.0
    non_update_abstraction_top_k: -1
  vm_reward:
    enable: False
    model_path: VGS-AI/DeepSeek-VM-1.5B
    tokenizer_path: deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B
    attn_implementation: flash_attention_2
    torch_dtype: bfloat16
    device: null
    device_map: auto
    scoring_batch_size: 8
    transform: logit
    normalization: zscore
    combination: add
    prob_clip: 1.0e-4
    zscore_eps: 1.0e-6
    zscore_clip: 3.0
    solver_weight: 0.1
    abstraction_weight: 0.1
    offload:
      enable: False
      folder: null
      state_dict: True
      low_cpu_mem_usage: True
  min_abstraction_chars: 32
  max_num_principles: 5
  require_principle_headers: True
  invalid_placeholders:
    - '...'
    - 'n/a'
    - 'none'
    - 'null'
    - 'unknown'
  validity_reward:
    valid: 0.1
    malformed: 0.05
    invalid: 0.0
  aggregation:
    mode: mean
    mean_weight: 1.0
    max_weight: 0.0
  filter_solver_groups: True
  resource_pools:
    mode: colocate
    solver_pool_id: global_pool
    abstraction_pool_id: global_pool
    solver_nnodes: null
    solver_gpus_per_node: null
    abstraction_nnodes: null
    abstraction_gpus_per_node: null

trainer:
  project_name: verl-two-policy
  actor_master_port_range: null
  abstraction_master_port_range: null
